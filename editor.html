<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery Editor</title>
  <link rel="stylesheet" href="editor.css">
</head>
<body>

<div id="toolbar">
  <button onclick="document.getElementById('load-photos').click()">+ Load photos</button>
  <input type="file" id="load-photos" multiple accept="image/*">

  <button onclick="loadLayout()">Reload layout</button>

  <div id="rotation-control">
    <span>Tilt</span>
    <input type="range" id="rotation-slider" min="-15" max="15" step="0.5" value="0" oninput="onRotationChange()">
    <span id="rotation-value">0°</span>
  </div>

  <button id="delete-btn" onclick="deleteSelected()">Delete</button>

  <button class="primary" onclick="saveLayout()">Save layout.json</button>

  <span id="status">no photos loaded</span>
</div>

<div id="canvas-wrapper">
  <div id="canvas">
    <div id="hint">
      <span id="hint-text">Load photos to begin</span>
      <span id="hint-sub">drag to position · select to tilt</span>
    </div>
  </div>
</div>

<script src="editor.js"></script>
</body>
</html>
