<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ .Title }} {{ with .Site.Title }}— {{ . }}{{ end }}</title>
  <style>
    body {
    background-color: #e8e8e8;
    margin: 0;
    padding: 2rem;
  }

  figure {
    display: inline-block;
    margin: -80px -60px;
    position: relative;
    vertical-align: top;
    z-index: 1;

    background: white;
    padding: 20px 20px 20px 20px;
    box-shadow: 2px 2px 8px rgba(0,0,0,0.2);
  }

  figure:hover {
    z-index: 100;
  }

  figure img {
    max-width: 400px;
    max-height: 400px;
    object-fit: contain;
    display: block;
  }

.lightbox {
  position: fixed;
  display: none;
  align-items: center;
  justify-content: center;
  inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 1000;
  cursor: pointer;
}

.lightbox.active {
  display: flex;
}

.lightbox figure {
  margin: 0;
  cursor: default;
  transform: none !important;
  padding: 40px 40px 40px 40px;
}

.lightbox figure img {
  max-width: 85vw;
  max-height: 85vh;
  object-fit: contain;
  display: block;
}
</style>
</head>
<body>
  {{ block "main" . }}{{ end }}
</body>
</html>
